version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "04:00"
    ignore:
      # wgpu is feature-only here and must stay aligned with eframe/egui-wgpu.
      - dependency-name: "wgpu"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
